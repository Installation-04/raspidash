services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - raspidash-data:/data
    environment:
      - DATA_PATH=/data/config.json
      - PORT=7532
    networks:
      - raspidash
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7532/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "7531:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - raspidash

volumes:
  raspidash-data:

networks:
  raspidash:
