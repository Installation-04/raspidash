services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - raspidash-data:/data
    environment:
      - DATA_PATH=/data/config.json
      - PORT=7532
    networks:
      - raspidash

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "7531:80"
    depends_on:
      - backend
    networks:
      - raspidash

volumes:
  raspidash-data:

networks:
  raspidash:
